name: smart_expense_tracker
description: Smart Expense Tracker - Fintech UI
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.1.2
  fl_chart: ^1.2.0
  intl: ^0.20.2
  shared_preferences: ^2.2.2
  uuid: ^4.3.3
  image_picker: ^1.1.2
  share_plus: ^13.1.0
  path_provider: ^2.1.5
  flutter_secure_storage: ^10.2.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  firebase_core: ^4.9.0
  cloud_firestore: ^6.4.1
  firebase_auth: ^6.5.1
  google_sign_in: ^7.2.0
  connectivity_plus: ^7.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4
  hive_generator: ^2.0.1
  build_runner: ^2.4.13

flutter:
  uses-material-design: true
  assets:
    - assets/

flutter_launcher_icons:
  android: "launcher_icon"
  image_path: "assets/icon.jpg"
  web:
    generate: true
    image_path: "assets/icon.jpg"
    background_color: "#0B0211"
    theme_color: "#0B0211"
